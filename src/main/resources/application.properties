# ─────────────────────────────────────────────
#  ShopFlow — Application Properties
# ─────────────────────────────────────────────

spring.application.name=shopflow

# ── Virtual Threads (Java 21 / Spring Boot 3.2+) ──────────────────
spring.threads.virtual.enabled=true

# ── H2 In-Memory Database ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:shopflowdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ── Redis ─────────────────────────────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ── ShopFlow custom properties ────────────────────────────────────
# Product cache TTL: 5 minutes (300,000 ms)
shopflow.cache.product-ttl-ms=300000

# Discount rates by customer tier (percentage, e.g. 10.0 = 10%)
shopflow.discount.premium-rate-percent=10.0
shopflow.discount.vip-rate-percent=20.0

# ── Mock Payment Gateway ───────────────────────────────────────────
# Simulated network latency per gateway call (ms)
shopflow.gateway.simulated-latency-ms=200
# Percentage of calls that deliberately fail (0-100).
# Set to 60+ to push past the 50% threshold and open the circuit.
shopflow.gateway.failure-rate-percent=20

# ── Resilience4j — Circuit Breaker ────────────────────────────────
# Sliding-window strategy: COUNT_BASED counts the last N calls;
# TIME_BASED counts calls in the last N seconds.
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-type=COUNT_BASED

# Number of calls in the sliding window used to calculate failure rate.
resilience4j.circuitbreaker.instances.paymentGateway.sliding-window-size=10

# Minimum number of calls required before the failure rate is calculated.
# Prevents the circuit opening after just 1 failed call on startup.
resilience4j.circuitbreaker.instances.paymentGateway.minimum-number-of-calls=5

# Open the circuit when failure rate exceeds this percentage.
resilience4j.circuitbreaker.instances.paymentGateway.failure-rate-threshold=50

# How long (seconds) the circuit stays OPEN before moving to HALF-OPEN.
resilience4j.circuitbreaker.instances.paymentGateway.wait-duration-in-open-state=10s

# Number of probe calls allowed through in HALF-OPEN state.
# If they succeed, the circuit closes; if they fail, it re-opens.
resilience4j.circuitbreaker.instances.paymentGateway.permitted-number-of-calls-in-half-open-state=3

# Automatically move from OPEN to HALF-OPEN after the wait duration
# (no need to wait for the next call to trigger the transition).
resilience4j.circuitbreaker.instances.paymentGateway.automatic-transition-from-open-to-half-open-enabled=true

# Expose circuit breaker state via Spring Boot Actuator.
management.endpoints.web.exposure.include=health,info,circuitbreakers
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
